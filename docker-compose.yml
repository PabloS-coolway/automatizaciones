services:
  postgres:
    image: postgres:16-alpine
    container_name: yorga-coolway-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: coolway
      POSTGRES_PASSWORD: coolway
      POSTGRES_DB: coolway_maestro
    ports:
      - '5544:5432' # host 5544 (5432/5433 ocupados por otros postgres)
    volumes:
      - coolway_pgdata:/var/lib/postgresql/data

volumes:
  coolway_pgdata:
